    4. dow-auth.js      — provides DoWAuth.requireAuth()
    5. dow-ui.js        — provides DoWUI.renderShell(), setPageContent(), etc.
    6. book.js          — this page's logic (runs last)
  -->

  <script src="assets/js/config.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
